<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | Dunigo Console</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --primary: #0ea5e9;
            --glass: rgba(15, 23, 42, 0.7);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--bg); color: white; height: 100vh; 
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, rgba(14, 165, 233, 0.05) 0%, transparent 50%);
        }

        .auth-card {
            background: var(--glass); backdrop-filter: blur(25px);
            padding: 2.5rem; border-radius: 28px; border: 1px solid var(--border);
            width: 100%; max-width: 420px; text-align: center;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .logo { font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: 0.5rem; letter-spacing: -1.5px; }
        .logo span { color: white; }
        
        h2 { font-size: 1.1rem; margin-bottom: 2rem; color: #94a3b8; font-weight: 400; }

        /* Custom Google Button Container */
        #googleBtnContainer {
            display: flex; justify-content: center; margin-top: 1.5rem;
        }

        .divider {
            display: flex; align-items: center; text-align: center;
            margin: 1.5rem 0; color: #475569; font-size: 0.75rem; letter-spacing: 1px;
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #1e293b; }
        .divider:not(:empty)::before { margin-right: 1em; }
        .divider:not(:empty)::after { margin-left: 1em; }

        /* Animation for success */
        #userProfile { display: none; margin-top: 20px; animation: slideDown 0.5s forwards; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .profile-pic { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--primary); margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo">DUNI<span>GO</span></div>
        <h2 id="statusText">Secure access to Dunigo Console</h2>

        <div id="g_id_onload"
             data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com" 
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleCredentialResponse"
             data-auto_prompt="true"> </div>

        <div id="googleBtnContainer">
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left">
            </div>
        </div>

        <div class="divider">OR USE EMAIL</div>
        
        <div id="userProfile">
            <img id="uPic" class="profile-pic" src="" alt="Profile">
            <h3 id="uName" style="color: white;"></h3>
            <p id="uEmail" style="color: var(--primary); font-size: 0.8rem;"></p>
            <p style="margin-top: 15px; font-size: 0.9rem;">Redirecting to Dashboard...</p>
        </div>

        <p id="footerText" style="margin-top: 20px; color: #475569; font-size: 0.8rem;">
            By logging in, you agree to Dunigo's Terms of Service.
        </p>
    </div>

    <script>
        // Token parse karne ke liye helper function
        function parseJwt (token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            return JSON.parse(jsonPayload);
        };

        // Google login hone ke baad ye function call hoga
        function handleCredentialResponse(response) {
            // response.credential mein user ki encrypted info hoti hai
            const responsePayload = parseJwt(response.credential);

            console.log("ID: " + responsePayload.sub);
            console.log('Full Name: ' + responsePayload.name);
            console.log('Email: ' + responsePayload.email);

            // UI Update
            document.getElementById('googleBtnContainer').style.display = 'none';
            document.querySelector('.divider').style.display = 'none';
            document.getElementById('statusText').innerText = "Authentication Successful!";
            
            document.getElementById('userProfile').style.display = 'block';
            document.getElementById('uName').innerText = responsePayload.name;
            document.getElementById('uEmail').innerText = responsePayload.email;
            document.getElementById('uPic').src = responsePayload.picture;

            // Yahan se aap user ko home page par bhej sakte hain
            setTimeout(() => {
                window.location.href = "dashboard.html"; // Redirect after 2 seconds
            }, 2500);
        }
    </script>
</body>
</html>
