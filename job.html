<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Job Posting | Dunigo Logistics</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --primary: #0ea5e9; --border: rgba(255, 255, 255, 0.08); --card: #0f172a; }
        body { background: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--card); border-right: 1px solid var(--border); padding: 30px 20px; display: none; }
        .sidebar h2 { font-size: 1.2rem; color: var(--primary); margin-bottom: 40px; }
        .nav-btn { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: none; background: transparent; color: #94a3b8; text-align: left; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .nav-btn.active { background: var(--primary); color: white; }
        .nav-btn:hover:not(.active) { background: rgba(255,255,255,0.05); }

        /* Main Content */
        .main-content { flex: 1; padding: 40px; display: none; }
        
        .submit-btn { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: 800; width: 100%; margin-top: 10px; text-decoration: none; display: inline-block; text-align: center; }

        .action-group { display: inline-flex; gap: 8px; align-items: center; }
        .view-btn { background: var(--primary); color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; }
        .view-btn:hover { opacity: 0.9; }
        .reject-btn { background: #ef4444; color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; }
        .reject-btn:hover { background: #dc2626; }
    </style>
</head>
<body>

    <div id="loadingScreen" style="padding: 50px; text-align: center; width: 100%;">
        <h2>Checking Admin Credentials...</h2>
    </div>

    <div class="sidebar" id="sidebar">
        <h2>Dunigo Admin</h2>
        <button class="nav-btn" onclick="window.location.href='admin.html'">Manage Applications</button>
        <button class="nav-btn active">Manage Job Posting</button>
        <button class="nav-btn" onclick="logout()" style="margin-top: 50px; color: #ef4444;">Logout</button>
    </div>

    <div class="main-content" id="mainContent">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h1>Manage Jobs</h1>
            <button class="submit-btn" style="width:auto; padding:12px 20px;" onclick="window.location.href='createjob.html'">
                + Create New Job
            </button>
        </div>

        <div id="jobsContainer" style="display:grid; gap:15px; margin-bottom: 20px;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJTyCo2IbqTNa06LHngcrcukxvGn0o72s",
            authDomain: "dunigo-977a6.firebaseapp.com",
            projectId: "dunigo-977a6",
            appId: "1:728896139433:web:6b2026924b159fce7179b8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const ADMIN_EMAIL = "aayush3268@gmail.com";

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
            } else if (user.email !== ADMIN_EMAIL) {
                document.getElementById("loadingScreen").innerHTML = `<h1 style="color:red; font-size: 2rem;">Access Denied</h1><p>You are not authorized to view this portal.</p>`;
            } else {
                document.getElementById("loadingScreen").style.display = "none";
                document.getElementById("sidebar").style.display = "block";
                document.getElementById("mainContent").style.display = "block";
                loadJobs();
            }
        });

        function loadJobs() {
            onSnapshot(collection(db, "jobs"), (snapshot) => {
                const container = document.getElementById("jobsContainer");
                container.innerHTML = "";

                snapshot.forEach((snap) => {
                    const data = snap.data();
                    const card = document.createElement("div");
                    card.style = `
                        background:#0f172a;
                        padding:20px;
                        border-radius:16px;
                        border:1px solid rgba(255,255,255,0.08);
                    `;
                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between; gap:20px; align-items:center;">
                            <div>
                                <h3 style="margin:0;">${data.role || 'Untitled Job'}</h3>
                                <p style="color:#94a3b8; margin: 5px 0 0 0;">${data.location || 'N/A'}</p>
                            </div>
                            <div class="action-group">
                                <button class="view-btn" onclick="editJob('${snap.id}')">Edit</button>
                                <button class="reject-btn" onclick="deleteJobById('${snap.id}')">Delete</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        // Edit function ab ID ke sath naye page par redirect karega
        window.editJob = (id) => {
            window.location.href = `createjob.html?edit=${id}`;
        };

        window.deleteJobById = async (id) => {
            if (!confirm("Delete this job posting permanently?")) return;
            try {
                await deleteDoc(doc(db, "jobs", id));
                alert("Job configuration successfully removed.");
            } catch (err) {
                alert("Deletion error: " + err.message);
            }
        };

        window.logout = () => signOut(auth).then(() => window.location.href = "login.html");
    </script>
</body>
</html>
