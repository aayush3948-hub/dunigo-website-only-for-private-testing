<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunigo Console | Secure Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --primary: #0ea5e9; --error: #ef4444; --glass: rgba(15, 23, 42, 0.7); --border: rgba(255, 255, 255, 0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; background-image: radial-gradient(circle at 0% 0%, rgba(14, 165, 233, 0.1) 0%, transparent 35%); padding: 20px; }
        .auth-card { background: var(--glass); backdrop-filter: blur(25px); padding: 2.5rem; border-radius: 28px; border: 1px solid var(--border); width: 100%; max-width: 420px; box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7); }
        .logo { font-size: 2rem; font-weight: 800; color: var(--primary); text-align: center; margin-bottom: 0.5rem; }
        h2 { text-align: center; font-size: 1.1rem; margin-bottom: 1.5rem; color: #94a3b8; font-weight: 400; }
        .input-group { margin-bottom: 1rem; }
        .input-group label { display: block; font-size: 0.8rem; margin-bottom: 0.4rem; color: #94a3b8; font-weight: 600; }
        .input-group input { width: 100%; padding: 12px; background: rgba(2, 6, 23, 0.5); border: 1px solid var(--border); border-radius: 12px; color: white; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-google { background: white; color: #111827; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        #msgBox { text-align: center; margin-bottom: 15px; font-size: 0.85rem; padding: 10px; border-radius: 10px; display: none; border: 1px solid transparent; }
        .hidden { display: none; }
        .switch-auth { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: #94a3b8; }
        .switch-auth a { color: var(--primary); cursor: pointer; font-weight: 700; }
    </style>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
        getAuth, 
        signInWithEmailAndPassword, 
        createUserWithEmailAndPassword, 
        updateProfile, 
        sendEmailVerification, 
        GoogleAuthProvider, 
        signInWithPopup,
        sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    
    // Yahan dhyan dein: getDoc add kiya hai
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAJTyCo2IbqTNa06LHngcrcukxvGn0o72s",
        authDomain: "dunigo-977a6.firebaseapp.com",
        projectId: "dunigo-977a6",
        appId: "1:728896139433:web:6b2026924b159fce7179b8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let isLoginMode = true;

    window.toggleMode = () => {
        isLoginMode = !isLoginMode;
        document.getElementById('nameGroup').classList.toggle('hidden');
        document.getElementById('formTitle').innerText = isLoginMode ? "Login to Console" : "Create Account";
        document.getElementById('submitBtn').innerText = isLoginMode ? "Login" : "Register & Send Link";
        document.getElementById('toggleLink').innerText = isLoginMode ? "Create Account" : "Login instead";
        document.getElementById('toggleText').innerText = isLoginMode ? "Need an account?" : "Already have an account?";
        document.getElementById('msgBox').style.display = 'none';
    };

    function showMsg(text, type = "error") {
        const box = document.getElementById('msgBox');
        box.style.display = "block";
        box.innerText = text;
        box.style.color = type === "error" ? "var(--error)" : "#22c55e";
        box.style.backgroundColor = type === "error" ? "rgba(239, 68, 68, 0.1)" : "rgba(34, 197, 94, 0.1)";
        box.style.borderColor = type === "error" ? "var(--error)" : "#22c55e";
    }

    // --- YE HAI LOGIN BUTTON KA FUNCTION ---
    window.handleAuth = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const name = document.getElementById('userName').value;

        if(!email || !pass) return showMsg("Email and Password are required!");

        try {
            if (isLoginMode) {
                // LOGIN
                const res = await signInWithEmailAndPassword(auth, email, pass);
                if (res.user.emailVerified) {
                    localStorage.setItem("userEmail", res.user.email);
                    window.location.replace("dashboard.html");
                } else {
                    showMsg("Please verify your email first!", "error");
                    await sendEmailVerification(res.user);
                }
            } else {
                // SIGNUP
                if (!name) return showMsg("Name is required!");
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(res.user, { displayName: name });
                
                // Database entry
                await setDoc(doc(db, "users", email), {
                    name: name,
                    email: email,
                    createdAt: new Date().toISOString(),
                    profilePic: "" // Shuru mein khali
                });

                await sendEmailVerification(res.user);
                showMsg("Verification Link Sent! Check your email.", "success");
                setTimeout(toggleMode, 3000);
            }
        } catch (error) {
            showMsg("Error: " + error.message);
        }
    };

    // --- GOOGLE LOGIN (Updated Photo logic) ---
    window.loginWithGoogle = async () => {
        try {
            const res = await signInWithPopup(auth, provider);
            const userDocRef = doc(db, "users", res.user.email);
            const userSnap = await getDoc(userDocRef);

            if (userSnap.exists()) {
                const userData = userSnap.data();
                // Agar pehle se apni pic lagayi hai toh Google wali overwrite nahi hogi
                await setDoc(userDocRef, {
                    name: userData.name || res.user.displayName,
                    email: res.user.email,
                    profilePic: userData.profilePic || res.user.photoURL 
                }, { merge: true });
            } else {
                await setDoc(userDocRef, {
                    name: res.user.displayName,
                    email: res.user.email,
                    profilePic: res.user.photoURL,
                    createdAt: new Date().toISOString()
                });
            }
            localStorage.setItem("userEmail", res.user.email);
            window.location.replace("dashboard.html");
        } catch (error) { showMsg(error.message); }
    };

    window.handleForgotPassword = async () => {
        const email = document.getElementById('email').value;
        if (!email) return showMsg("Please Enter your Registered Email ID First!", "error");
        try {
            await sendPasswordResetEmail(auth, email);
            showMsg("Reset link has been sent!", "success");
        } catch (error) { showMsg("Error: " + error.message); }
    };
</script>
</head>
<body>
    <div class="auth-card">
        <div class="logo">DUNI<span>GO</span></div>
        <h2 id="formTitle">Login to Console</h2>
        <div id="msgBox"></div>
        <div class="input-group hidden" id="nameGroup"><label>Full Name</label><input type="text" id="userName" placeholder="Your Name"></div>
        <div class="input-group"><label>Email Address</label><input type="email" id="email" placeholder="name@example.com"></div>
        <div class="input-group"><label>Password</label><input type="password" id="pass" placeholder="••••••••"></div>
        <div style="text-align: right; margin-top: -10px; margin-bottom: 10px;">
            <a onclick="handleForgotPassword()" style="color: var(--primary); font-size: 0.75rem; cursor: pointer; text-decoration: none;">Forgot Password?</a>
        </div>
        <button class="btn btn-primary" id="submitBtn" onclick="handleAuth()">Login</button>
        <button class="btn btn-google" onclick="loginWithGoogle()"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">Sign in with Google</button>
        <div class="switch-auth"><span id="toggleText">Need an account?</span> <a onclick="toggleMode()" id="toggleLink">Create Account</a></div>
    </div>
</body>
</html>
