<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Submitted | Dunigo</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --primary: #0ea5e9; --border: rgba(255, 255, 255, 0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            background-color: var(--bg); 
            color: white; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            background-image: radial-gradient(circle at 50% 50%, #0c4a6e 0%, transparent 70%);
        }
        .success-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 32px;
            border: 1px solid var(--border);
            text-align: center;
            max-width: 500px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
        }
        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(34, 197, 94, 0.1);
            border: 2px solid #22c55e;
            color: #22c55e;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            margin: 0 auto 25px;
        }
        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 15px; }
        p { color: #94a3b8; line-height: 1.6; margin-bottom: 30px; }
        .btn-home {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 14px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }
        .btn-home:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3); }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-circle">✓</div>
        <h1>Application Sent!</h1>
        <p>We've received your application. We've sent a message to your email. Our team will review it and contact you shortly.</p>
        <a href="dashboard.html" class="btn-home">Back to Home</a>
    </div>

</body>
</html>
