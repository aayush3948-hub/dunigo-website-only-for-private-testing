<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunigo Console | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* CSS WAHI HAI JO AAPNE DIYA THA */
        .explore-container { display: flex; justify-content: center; margin-top: 40px; }
        .explore-btn { position: relative; padding: 16px 32px; background: linear-gradient(45deg, #0ea5e9, #2563eb); color: white; font-size: 1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; border: none; border-radius: 50px; cursor: pointer; transition: all 0.4s ease; box-shadow: 0 0 15px rgba(14, 165, 233, 0.4); display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .explore-btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 0 30px rgba(14, 165, 233, 0.7); letter-spacing: 2px; }
        .explore-btn::after { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; background: linear-gradient(45deg, #0ea5e9, #2563eb, #00f2ff, #0ea5e9); background-size: 400%; z-index: -1; filter: blur(10px); border-radius: 50px; opacity: 0.5; animation: buttonGlow 8s linear infinite; }
        @keyframes buttonGlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        :root { --bg: #020617; --primary: #0ea5e9; --glass: rgba(15, 23, 42, 0.7); --border: rgba(255, 255, 255, 0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }
        nav { padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(2, 6, 23, 0.9); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        .profile-trigger { display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 5px 15px; border-radius: 50px; background: var(--border); transition: 0.3s; }
        .profile-trigger:hover { background: rgba(255,255,255,0.15); }
        .nav-img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
        main { padding: 3rem 8%; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 3rem; }
        .stat-card { background: var(--glass); padding: 1.5rem; border-radius: 24px; border: 1px solid var(--border); text-align: center; }
        .stat-card .value { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .table-container { background: var(--glass); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: #94a3b8; padding: 15px; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 15px; border-top: 1px solid var(--border); font-size: 0.95rem; }
        #profileSidebar { position: fixed; top: 0; right: -450px; width: 400px; height: 100vh; background: #0f172a; border-left: 1px solid var(--border); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; padding: 40px 30px; box-shadow: -20px 0 50px rgba(0,0,0,0.8); overflow-y: auto; }
        #profileSidebar.active { right: 0; }
        .close-btn { cursor: pointer; font-size: 0.9rem; color: #94a3b8; background: var(--border); padding: 8px 15px; border-radius: 8px; float: right; }
        .edit-pic-container { width: 120px; height: 120px; margin: 40px auto 20px; position: relative; cursor: pointer; }
        .edit-pic-container img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); box-shadow: 0 0 20px rgba(14, 165, 233, 0.3); }
        .overlay { position: absolute; bottom: 0; background: rgba(14, 165, 233, 0.9); width: 100%; text-align: center; font-size: 0.65rem; padding: 6px 0; border-radius: 0 0 60px 60px; font-weight: 800; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
        .input-group input, .input-group select { width: 100%; background: #020617; border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: white; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: var(--primary); }
        .btn-save { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: 800; cursor: pointer; margin-top: 10px; box-shadow: 0 10px 20px rgba(14, 165, 233, 0.2); }
        .btn-save:hover { filter: brightness(1.1); }
        .btn-logout { width: 100%; padding: 12px; background: transparent; border: 1.5px solid #ef4444; color: #ef4444; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 25px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-logout:hover { background: #ef4444; color: white; box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3); }
        .resume-box { border: 2px dashed var(--border); padding: 15px; text-align: center; border-radius: 12px; cursor: pointer; transition: 0.3s; color: #94a3b8; font-size: 0.85rem; }
        .resume-box:hover { border-color: var(--primary); background: rgba(14, 165, 233, 0.05); }
        .resume-box.uploaded { border-color: #22c55e; color: #22c55e; background: rgba(34, 197, 94, 0.05); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">DUNI<span>GO</span></div>
        <div class="profile-trigger" onclick="toggleSidebar()">
            <span id="navUserName">Loading...</span>
            <img id="navUserPic" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="nav-img">
        </div>
    </nav>

    <main>
        <h1 id="welcomeTitle">Welcome to Console ⚡</h1>
        <p style="color: #94a3b8; margin-bottom: 30px;">Manage your applications and profile in real-time.</p>

        <div class="stats-grid">
            <div class="stat-card"><h3>Applied</h3><div class="value" id="statApplied">0</div></div>
            <div class="stat-card"><h3>Interviews</h3><div class="value" id="statInterviews">0</div></div>
            <div class="stat-card"><h3>Offers</h3><div class="value">0</div></div>
        </div>

        <div class="table-container">
            <h3>Recent Job Activities</h3>
            <table>
                <thead>
                    <tr><th>Company</th><th>Role</th><th>Status</th></tr>
                </thead>
                <tbody id="jobTableBody">
                    <tr><td colspan="3" style="text-align:center; padding:40px; color:#475569;">Syncing with cloud database...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="profileSidebar">
        <span class="close-btn" onclick="toggleSidebar()">× Close</span>
        <h2 style="margin-top: 20px;">Profile Settings</h2>
        
        <div class="edit-pic-container" onclick="triggerPhotoUpload()">
            <img id="editUserPic" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <div class="overlay">CHANGE PHOTO</div>
        </div>

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="editNameField" placeholder="Enter your name">
        </div>

        <div class="input-group">
            <label>Gender</label>
            <select id="editGender">
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="input-group">
            <label>Resume (PDF)</label>
            <div class="resume-box" id="resumeDisplay" onclick="document.getElementById('resumeFile').click()">
                <span id="resumeText">📄 Click to upload Resume</span>
                <input type="file" id="resumeFile" hidden accept=".pdf" onchange="handleResumeUpload(this)">
            </div>
        </div>

        <button class="btn-save" onclick="saveToCloud()">Save All Changes</button>
        <button class="btn-logout" onclick="logoutUser()">Logout from Console</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJTyCo2IbqTNa06LHngcrcukxvGn0o72s",
            authDomain: "dunigo-977a6.firebaseapp.com",
            projectId: "dunigo-977a6",
            appId: "1:728896139433:web:6b2026924b159fce7179b8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let tempResumeBase64 = null;

        onAuthStateChanged(auth, async (user) => {
    if (user && user.emailVerified) {
        // Sirf Name dikhao fallback ke liye, Photo ke liye snapshot ka wait karo
        if(user.displayName) {
            document.getElementById("navUserName").innerText = user.displayName;
            document.getElementById("welcomeTitle").innerText = `Welcome, ${user.displayName.split(' ')[0]}! ⚡`;
        }
        
        const userRef = doc(db, "users", user.email);
        startProfileSync(userRef); // Ye function database se photo uthayega
        fetchUserApplications(user.email);
    } else {
        window.location.replace("login.html");
    }
});

function startProfileSync(userRef) {
    onSnapshot(userRef, (docSnap) => {
        if (docSnap.exists()) {
            const data = docSnap.data();
            
            // PRIORITY: Database Name > Auth Name
            const userName = data.name || auth.currentUser.displayName || "Engineer";
            document.getElementById("navUserName").innerText = userName;
            document.getElementById("welcomeTitle").innerText = `Welcome, ${userName.split(' ')[0]}! ⚡`;
            
            // PRIORITY: Database Photo > Auth Photo > Default Icon
            // Yahan check karo ki database mein updated pic hai ya nahi
            const profileImg = data.profilePic || auth.currentUser.photoURL || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            
            document.getElementById("navUserPic").src = profileImg;
            document.getElementById("editUserPic").src = profileImg;
            
            document.getElementById("editNameField").value = userName;
            document.getElementById("editGender").value = data.gender || "";

            if (data.resumePDF) {
                document.getElementById("resumeDisplay").classList.add("uploaded");
                document.getElementById("resumeText").innerText = "✅ Resume Attached";
            }
        }
    });
}

        function fetchUserApplications(userEmail) {
            const q = query(collection(db, "applications"), where("applicantEmail", "==", userEmail));
            onSnapshot(q, (snapshot) => {
                let html = "";
                let appliedCount = 0;
                let interviewCount = 0;

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    appliedCount++;
                    if (data.status === "Interview Scheduled") interviewCount++;
                    let statusColor = "#eab308";
                    if(data.status === "Interview Scheduled") statusColor = "#22c55e";
                    if(data.status === "Rejected") statusColor = "#ef4444";

                    html += `<tr><td>${data.company || 'Dunigo'}</td><td>${data.jobRole}</td><td style="font-weight:600; color:${statusColor}">${data.status || 'Under Review'}</td></tr>`;
                });
                document.getElementById("jobTableBody").innerHTML = html || '<tr><td colspan="3" style="text-align:center; padding:20px;">No jobs applied yet.</td></tr>';
                document.getElementById("statApplied").innerText = appliedCount;
                document.getElementById("statInterviews").innerText = interviewCount;
            });
        }

        window.handleResumeUpload = function(input) {
            const file = input.files[0];
            if (!file) return;
            if (file.type !== "application/pdf") return alert("Only PDF allowed!");
            if (file.size > 1048487) return alert("File too large (>1MB)");
            const reader = new FileReader();
            reader.onload = (e) => {
                tempResumeBase64 = e.target.result;
                document.getElementById("resumeDisplay").classList.add("uploaded");
                document.getElementById("resumeText").innerText = "📄 " + file.name + " (Ready)";
            };
            reader.readAsDataURL(file);
        };

        window.saveToCloud = async () => {
            const name = document.getElementById("editNameField").value;
            const gender = document.getElementById("editGender").value;
            const updateData = { name, gender };
            if (tempResumeBase64) updateData.resumePDF = tempResumeBase64;
            try {
                await setDoc(doc(db, "users", auth.currentUser.email), updateData, { merge: true });
                alert("Settings Saved! ✅");
            } catch (err) { alert("Error: " + err.message); }
        };

        window.triggerPhotoUpload = function() {
            const input = document.createElement('input');
            input.type = 'file'; input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file || file.size > 1048487) return alert("Image must be < 1MB");
                const reader = new FileReader();
                reader.onload = async (event) => {
                    await setDoc(doc(db, "users", auth.currentUser.email), { profilePic: event.target.result }, { merge: true });
                    alert("Photo Updated! ✨");
                };
                reader.readAsDataURL(file);
            };
            input.click();
        };

        window.logoutUser = () => signOut(auth).then(() => window.location.replace("login.html"));
        window.toggleSidebar = () => document.getElementById("profileSidebar").classList.toggle("active");
    </script>
    <div class="explore-container">
        <a href="carrer.html" class="explore-btn">Explore More Jobs</a>
    </div>
</body>
</html>
