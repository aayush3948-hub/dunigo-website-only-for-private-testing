<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | Dunigo Logistics</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --primary: #0ea5e9; --border: rgba(255, 255, 255, 0.08); --card: #0f172a; }
        body { background: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--card); border-right: 1px solid var(--border); padding: 30px 20px; display: none; }
        .sidebar h2 { font-size: 1.2rem; color: var(--primary); margin-bottom: 40px; }
        .nav-btn { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: none; background: transparent; color: #94a3b8; text-align: left; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .nav-btn.active { background: var(--primary); color: white; }
        .nav-btn:hover:not(.active) { background: rgba(255,255,255,0.05); }

        /* Main Content */
        .main-content { flex: 1; padding: 40px; display: none; }
        
        /* Tables */
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); }
        th, td { padding: 18px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: middle; }
        th { background: rgba(14, 165, 233, 0.1); color: var(--primary); font-size: 0.8rem; text-transform: uppercase; }

        .action-group { display: inline-flex; gap: 8px; align-items: center; }
        .view-btn { background: var(--primary); color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; }
        .view-btn:hover { opacity: 0.9; }
        .reject-btn { background: #ef4444; color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; }
        .reject-btn:hover { background: #dc2626; }

        .status-tag { font-size: 0.7rem; padding: 4px 8px; border-radius: 4px; font-weight: 700; display: inline-block; }
        .pending { background: rgba(234, 179, 8, 0.1); color: #eab308; }
        .scheduled { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .rejected { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    </style>
</head>
<body>

    <div id="loadingScreen" style="padding: 50px; text-align: center; width: 100%;">
        <h2>Checking Admin Credentials...</h2>
    </div>

    <div class="sidebar" id="sidebar">
        <h2>Dunigo Admin</h2>
        <button class="nav-btn active">Manage Applications</button>
        <button class="nav-btn" onclick="window.location.href='job.html'">Manage Job Posting</button>
        <button class="nav-btn" onclick="logout()" style="margin-top: 50px; color: #ef4444;">Logout</button>
    </div>

    <div class="main-content" id="mainContent">
        <h1 style="margin-bottom: 20px;">Candidate Applications</h1>
        <table>
            <thead>
                <tr>
                    <th>Applicant</th>
                    <th>Role</th>
                    <th>Applied On</th>
                    <th>Status</th>
                    <th style="width: 280px;">Actions</th>
                </tr>
            </thead>
            <tbody id="appTableBody"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJTyCo2IbqTNa06LHngcrcukxvGn0o72s",
            authDomain: "dunigo-977a6.firebaseapp.com",
            projectId: "dunigo-977a6",
            appId: "1:728896139433:web:6b2026924b159fce7179b8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const ADMIN_EMAIL = "aayush3268@gmail.com";

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
            } else if (user.email !== ADMIN_EMAIL) {
                document.getElementById("loadingScreen").innerHTML = `<h1 style="color:red; font-size: 2rem;">Access Denied</h1><p>You are not authorized to view this portal.</p>`;
            } else {
                document.getElementById("loadingScreen").style.display = "none";
                document.getElementById("sidebar").style.display = "block";
                document.getElementById("mainContent").style.display = "block";
                loadApplications();
            }
        });

        function loadApplications() {
            onSnapshot(collection(db, "applications"), (snapshot) => {
                const tbody = document.getElementById("appTableBody");
                tbody.innerHTML = "";
                snapshot.forEach((snap) => {
                    const data = snap.data();
                    const tr = document.createElement("tr");
                    
                    let statusClass = "pending";
                    if (data.status === "Rejected") statusClass = "rejected";
                    if (data.status === "Interview Scheduled") statusClass = "scheduled";

                    let formattedDate = "N/A";
                    if (data.appliedAt) {
                        const dateObj = data.appliedAt.toDate ? data.appliedAt.toDate() : new Date(data.appliedAt);
                        formattedDate = dateObj.toLocaleDateString('en-IN', {
                            day: '2-digit',
                            month: 'short',
                            year: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit'
                        });
                    }
                    
                    tr.innerHTML = `
                        <td><b>${data.applicantName || 'Unknown'}</b><br><small style="color:#94a3b8;">${data.applicantEmail || ''}</small></td>
                        <td>${data.jobRole || 'N/A'}</td>
                        <td><small style="color: #94a3b8;">${formattedDate}</small></td>
                        <td><span class="status-tag ${statusClass}">${data.status || 'Pending'}</span></td>
                        <td>
                            <div class="action-group">
                                <button class="view-btn" style="background:#6366f1;" onclick="viewDetails('${snap.id}')">View Details</button>
                                <button class="view-btn" onclick="openPDF('${data.resumeData}')">Resume</button>
                                <button class="view-btn" style="background:#22c55e;" onclick="scheduleInterview('${snap.id}')">Schedule</button>
                                <button class="reject-btn" onclick="updateStatus('${snap.id}', 'Rejected')">Reject</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            });
        }

        window.viewDetails = (docId) => {
            if (!docId) return alert("Invalid Application ID");
            window.location.href = `view.html?id=${docId}`;
        };

        window.scheduleInterview = async (docId) => {
            const dateTime = prompt("Enter Interview Date & Time (e.g., 25th Oct, 2:00 PM):");
            if (!dateTime || dateTime.trim() === "") return;
            try {
                await updateDoc(doc(db, "applications", docId), {
                    status: "Interview Scheduled",
                    interviewTime: dateTime
                });
                alert("Interview scheduled successfully! ✨");
            } catch (err) {
                alert("Failed to schedule: " + err.message);
            }
        };

        window.updateStatus = async (id, status) => {
            try {
                await updateDoc(doc(db, "applications", id), { status: status });
                alert(`Status updated to ${status}!`);
            } catch (err) {
                alert("Error updating status: " + err.message);
            }
        };

        window.openPDF = (base64) => {
            if (!base64 || base64 === "undefined") return alert("No valid resume data found.");
            const win = window.open();
            win.document.write(`<iframe src="${base64}" frameborder="0" style="width:100%; height:100%;"></iframe>`);
        };

        window.logout = () => signOut(auth).then(() => window.location.href = "login.html");
    </script>
</body>
</html>
